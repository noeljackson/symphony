name: make-all

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  make-all:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elixir

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up mise tools
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
        with:
          install: true
          cache: true
          working_directory: elixir

      - name: Cache deps and build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            elixir/deps
            elixir/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('elixir/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: mix setup
        run: make setup

      - name: mix build
        run: make build

      - name: mix format --check-formatted
        run: make fmt-check

      - name: mix lint (specs.check + credo --strict)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          mix lint 2>&1 | tee /tmp/lint.out
          rc=${PIPESTATUS[0]}
          if [ $rc -ne 0 ] && [ -n "$PR_NUMBER" ] && [ -s /tmp/lint.out ]; then
            jq -Rs '{"body": ("## mix lint output\n\n```\n" + . + "\n```")}' /tmp/lint.out > /tmp/lint.json
            curl -fsSL -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -d @/tmp/lint.json \
              "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
              && echo lint-comment-posted || echo lint-comment-post-failed
          fi
          exit $rc

      - name: mix test --cover
        run: make coverage

      - name: mix dialyzer
        run: make dialyzer
